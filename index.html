<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ MODO APP IPHONE -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0f172a">

<title>Gestor Rutina Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- ✅ Librería para Gráficas -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ✅ FIX iPhone inputs -->
<style>
input { font-size:16px; }
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type=number] {
  -moz-appearance: textfield;
}
</style>

</head>
<body class="bg-slate-900 text-white min-h-screen">

<div class="max-w-7xl mx-auto p-4">

<h1 class="text-3xl font-bold mb-4">🏋️ Gestor de Rutina Semanal</h1>

<!-- ✅ BACKUP -->
<div class="flex gap-2 mb-4">
  <button onclick="exportData()" class="bg-green-600 px-3 py-2 rounded text-sm font-semibold">📤 Exportar Copia</button>
  <button onclick="importData()" class="bg-blue-600 px-3 py-2 rounded text-sm font-semibold">📥 Importar Copia</button>
</div>

<p class="mb-4 text-slate-300">Incluye cronómetro manual, historial con orden invertido, guía de técnica detallada y control de medidas.</p>

<!-- PÁGINA PRINCIPAL (MENÚ) -->
<div id="mainPage">
  <div id="menu" class="grid md:grid-cols-2 lg:grid-cols-5 gap-4"></div>
</div>

<!-- VISTA DE RUTINAS -->
<div id="routineView" class="hidden">
<div class="flex gap-2 mb-3">
  <button onclick="backHome()" class="bg-slate-700 px-3 py-2 rounded text-sm font-semibold">⬅ Volver</button>
</div>

<div class="flex flex-wrap gap-4 items-center mb-4 bg-slate-800 p-4 rounded">
  <h2 id="title" class="text-2xl font-bold"></h2>
  <button id="startTimerBtn" onclick="startTimerManual()" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1 rounded font-bold text-sm">▶️ Iniciar</button>
  <div class="bg-slate-700 px-4 py-2 rounded font-mono text-xl font-bold">⏱️ <span id="timer">00:00:00</span></div>

  <div class="flex-1">
    <div class="bg-slate-700 h-4 rounded">
      <div id="bar" class="bg-green-500 h-4 rounded" style="width:0%"></div>
    </div>
  </div>
  <div id="pct" class="font-bold">0%</div>
</div>

<div id="exercises"></div>

<!-- ✅ BOTÓN FINALIZAR SESIÓN -->
<div class="mt-6 mb-8 text-center">
  <button onclick="finishRoutine()" class="bg-green-600 hover:bg-green-500 text-white text-xl font-bold py-4 px-8 rounded-xl shadow-lg transition w-full md:w-auto">
    🏁 Finalizar Sesión y Guardar
  </button>
</div>
</div>

<!-- VISTA DE MEDIDAS -->
<div id="measuresView" class="hidden">
  <button onclick="backHome()" class="bg-slate-700 px-3 py-2 rounded mb-4 text-sm font-semibold">⬅ Volver</button>
  
  <div class="grid lg:grid-cols-2 gap-6">
    <!-- Formulario Nueva Medida -->
    <div class="bg-slate-800 p-6 rounded-xl">
      <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">📏 Registrar Peso y Medidas (cm)</h2>
      <div class="grid grid-cols-2 gap-4">
        <!-- ✅ APARTADO PESO ADICIONADO -->
        <div class="col-span-2 bg-slate-900 p-3 rounded-lg border border-slate-700 mb-2">
          <label class="block text-amber-400 text-sm font-bold mb-1 text-center">Peso Corporal (kg)</label>
          <input id="m_peso" class="w-full text-black p-2 rounded text-center font-extrabold text-lg bg-amber-100" type="number" step="0.01" inputmode="decimal" placeholder="0.00">
        </div>
        <div>
          <label class="block text-slate-400 text-sm mb-1">Brazo</label>
          <input id="m_brazo" class="w-full text-black p-2 rounded text-center font-bold" type="number" step="0.1" inputmode="decimal" placeholder="0.0">
        </div>
        <div>
          <label class="block text-slate-400 text-sm mb-1">Pierna</label>
          <input id="m_pierna" class="w-full text-black p-2 rounded text-center font-bold" type="number" step="0.1" inputmode="decimal" placeholder="0.0">
        </div>
        <div>
          <label class="block text-slate-400 text-sm mb-1">Cintura</label>
          <input id="m_cintura" class="w-full text-black p-2 rounded text-center font-bold" type="number" step="0.1" inputmode="decimal" placeholder="0.0">
        </div>
        <div>
          <label class="block text-slate-400 text-sm mb-1">Estómago</label>
          <input id="m_estomago" class="w-full text-black p-2 rounded text-center font-bold" type="number" step="0.1" inputmode="decimal" placeholder="0.0">
        </div>
        <div>
          <label class="block text-slate-400 text-sm mb-1">Cadera</label>
          <input id="m_cadera" class="w-full text-black p-2 rounded text-center font-bold" type="number" step="0.1" inputmode="decimal" placeholder="0.0">
        </div>
        <div>
          <label class="block text-slate-400 text-sm mb-1">Pecho</label>
          <input id="m_pecho" class="w-full text-black p-2 rounded text-center font-bold" type="number" step="0.1" inputmode="decimal" placeholder="0.0">
        </div>
        <!-- ✅ CAMPO GLÚTEO ADICIONADO -->
        <div>
          <label class="block text-slate-400 text-sm mb-1">Glúteo</label>
          <input id="m_gluteo" class="w-full text-black p-2 rounded text-center font-bold" type="number" step="0.1" inputmode="decimal" placeholder="0.0">
        </div>
      </div>
      <button onclick="saveMeasures()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold text-lg">💾 Guardar Registro</button>
    </div>

    <!-- Historial y Botón de Gráfica -->
    <div class="bg-slate-800 p-6 rounded-xl flex flex-col justify-between">
      <div>
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-2xl font-bold flex items-center gap-2">📈 Histórico & Gráficas</h2>
          <button onclick="toggleMeasuresChart()" class="bg-purple-600 hover:bg-purple-500 px-3 py-1.5 rounded font-bold text-sm">📊 Ver/Ocultar Gráfica</button>
        </div>
        
        <!-- Contenedor del Gráfico Dinámico -->
        <div id="chartContainer" class="hidden bg-slate-950 p-2 rounded-lg mb-4">
          <canvas id="measuresChart" class="w-full h-64"></canvas>
        </div>

        <div class="overflow-x-auto max-h-96 overflow-y-auto">
          <table class="w-full text-sm text-left text-slate-300">
            <thead class="text-xs uppercase bg-slate-700 text-slate-200 sticky top-0">
              <tr>
                <th class="px-2 py-2">Fecha</th>
                <th class="px-1 py-2 text-center text-amber-400">Kg</th>
                <th class="px-1 py-2 text-center">Br</th>
                <th class="px-1 py-2 text-center">Pi</th>
                <th class="px-1 py-2 text-center">Ci</th>
                <th class="px-1 py-2 text-center">Es</th>
                <th class="px-1 py-2 text-center">Ca</th>
                <th class="px-1 py-2 text-center">Pe</th>
                <th class="px-1 py-2 text-center text-orange-300">Gl</th>
              </tr>
            </thead>
            <tbody id="measuresTableBody">
              <!-- Rellenado dinámicamente -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL PRINCIPAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 p-4 overflow-auto z-50 flex items-center justify-center">
<div class="w-full max-w-4xl bg-slate-800 p-6 rounded-xl shadow-2xl relative">
<div class="flex justify-between items-center border-b border-slate-700 pb-3">
<h3 id="modalTitle" class="text-xl font-bold text-emerald-400"></h3>
<button onclick="closeModal()" class="text-3xl font-bold leading-none hover:text-slate-400">&times;</button>
</div>
<div id="modalContent" class="mt-4 overflow-y-auto max-h-[75vh]"></div>
</div>
</div>

</div>

<script>

// ✅ INSTANCIACIÓN DE BASE DE DATOS LOCAL SEGURA
let store;
try {
  store = JSON.parse(localStorage.getItem("gymPro")) 
    || {sessions:[],history:{},active:{}, measures:[]};
  if(!store.measures) store.measures = [];
} catch {
  store = {sessions:[],history:{},active:{}, measures:[]};
}

// ✅ RUTINA ORIGINAL CON NUEVAS DESCRIPCIONES TÉCNICAS COMPLETAS PARA EJECUCIÓN SIN IMÁGENES
const routines={
"Sesion 1 Superior":[
  ["Press mancuernas plano",4,"8-10"],["Remo pecho apoyado",4,"8-10"],["Pullover",3,"12-15"],["Elevaciones laterales",2,"15"],["Curl alterno",3,"10-12"],["Abwheel",3,"6-10"]
],
"Sesion 2 Inferior":[
  ["Sentadilla Goblet",4,"10-12"],["Bulgarian split",3,"10"],["Hip thrust",4,"10"],["Plancha frontal",3,"45s"],["Plancha lateral",3,"30s"]
],
"Sesion 3 Superior":[
  ["Flexiones déficit",4,"10-15"],["Remo unilateral",4,"10-12"],["Press inclinado",3,"10"],["Face pull goma",3,"15"],["Curl araña",3,"12"],["Katana tríceps",3,"12-15"]
],
"Sesion 4 Inferior":[
  ["Hack squat",4,"10-12"],["Peso muerto rumano",4,"10"],["Step up",3,"12"],["Sentadilla isométrica",3,"45-60s"],["Russian twist",3,"20"]
]
};

const desc={
  "Press mancuernas plano": "Acuéstate boca arriba en un banco plano con los pies firmes en el suelo. Sostén una mancuerna en cada mano alineadas al pecho. Contrae los omóplatos empujándolos contra el banco. Inicia con los brazos extendidos y desciende las mancuernas de manera controlada doblando los codos a un ángulo de 45 grados respecto al torso, hasta que las mancuernas toquen ligeramente los lados del pecho. Empuja el peso verticalmente hacia arriba contrayendo el pectoral hasta extender los brazos sin bloquear los codos por completo.",
  "Remo pecho apoyado": "Ajusta un banco inclinado a unos 30-45 grados. Colócate boca abajo apoyando el pecho firmemente contra el respaldo, dejando que los brazos cuelguen rectos hacia abajo sosteniendo las mancuernas con agarre neutro (palmas mirándose). Sin despegar el pecho del banco ni balancear el cuello, tracciona las mancuernas hacia tus caderas llevando los codos hacia atrás y arriba. Aprieta las escápulas al final del movimiento durante un segundo y desciende el peso de forma pausada regresando los brazos a la posición colgante inicial.",
  "Pullover": "Acuéstate perpendicularmente sobre un banco apoyando únicamente la parte alta de la espalda (escapulas), con la cadera suspendida y ligeramente baja, pies firmes en el suelo. Sostén una mancuerna con ambas manos formando un rombo con tus pulgares e índices bajo el disco superior. Con los brazos casi rectos (ligera flexión en los codos para proteger la articulación), lleva la mancuerna hacia atrás de tu cabeza de forma lenta hasta que tus brazos queden alineados con tu torso sintiendo el estiramiento en dorsales y pecho. Regresa el peso verticalmente sobre tu pecho contrayendo el dorsal.",
  "Elevaciones laterales": "Párate recto con los pies al ancho de las caderas, flexiona ligeramente las rodillas e inclina el torso apenas unos centímetros hacia adelante para estabilizar la columna. Sostén las mancuernas frente a tus muslos. Manteniendo una flexión constante e interna en los codos, eleva las mancuernas hacia los lados dibujando un arco amplio en dirección 'hacia afuera' en lugar de 'hacia arriba'. Sube hasta que los brazos queden paralelos al suelo (altura del hombro) con los meñiques sutilmente más altos que los pulgares. Desciende reteniendo la gravedad.",
  "Curl alterno": "Póngase de pie con la columna erguida y los pies separados al ancho de hombros. Comience con una mancuerna en cada mano colgando a los costados con agarre neutro (tipo martillo). De forma alterna, contrae el bíceps de un brazo flexionando el codo hacia arriba; durante la primera mitad de la subida rota la muñeca hacia afuera (supinación) para que la palma de la mano mire hacia tu hombro en el punto más alto. Aprieta el bíceps, desciende invirtiendo la rotación y repite idénticamente con el brazo opuesto manteniendo el resto del cuerpo inmóvil.",
  "Abwheel": "Colócate de rodillas en el suelo con la rueda abdominal justo debajo de tus hombros, sujetando firmemente los mangos laterales. Contrae el abdomen profundamente desde la posición inicial encorvando ligeramente la espalda alta (posición de gato) para bloquear la zona lumbar. Desplaza la rueda hacia adelante extendiendo tus caderas y brazos al mismo tiempo de manera lineal. Avanza exhalando hasta el punto máximo donde sientas tensión en el abdomen pero sin perder la neutralidad de la espalda baja. Regresa contrayendo el abdomen hacia la postura inicial.",
  "Sentadilla Goblet": "Párate con los pies un poco más abiertos que el ancho de los hombros y las puntas apuntando ligeramente hacia afuera (unos 15-30 grados). Sostén una mancuerna pesada verticalmente con ambas manos pegada firmemente contra el centro de tu pecho, manteniendo los codos cerrados apuntando al suelo. Inicia el movimiento empujando la cadera hacia atrás y doblando las rodillas de forma simultánea. Desciende manteniendo el torso erguido hasta que tus muslos rompan el paralelo con el suelo (o hasta donde mantengas la espalda recta). Rompe la inercia empujando con toda la planta del pie hacia arriba.",
  "Bulgarian split": "Colócate de espaldas a un banco a un paso de distancia. Da un paso al frente con el pie activo, asentándolo plano en el suelo, y ubica el empeine del pie trasero sobre la superficie del banco. Mantén las mancuernas a los costados con los brazos estirados. Baja la cadera verticalmente flexionando la rodilla delantera; asegúrate de que dicha rodilla descienda alineada con la punta del pie sin sobrepasarla excesivamente. Baja hasta que el muslo delantero quede paralelo al suelo y la rodilla trasera casi toque el piso. Empuja con el talón delantero para reincorporarte.",
  "Hip thrust": "Siéntate en el suelo apoyando la parte inferior de tus escápulas contra el borde de un banco plano. Coloca una barra o mancuerna pesada sobre tu pelvis (usa almohadilla). Dobla las rodillas colocando los pies firmes en el suelo, separados al ancho de hombros y a una distancia tal que, al subir, tus espinillas queden completamente verticales (90 grados). Empuja fuertemente a través de tus talones elevando la cadera hacia el techo, alineando los muslos con el torso en una línea horizontal plana. Aprieta los glúteos un segundo arriba manteniendo la mirada al frente y baja controlado.",
  "Plancha frontal": "Colócate boca abajo en el suelo apoyando tu peso exclusivamente en los antebrazos y en las puntas de los pies. Los codos deben situarse exactamente debajo de la línea de los hombros formando un ángulo recto. Contrae activamente tus cuádriceps, glúteos y el abdomen. Tu cuerpo debe trazar una línea perfectamente recta desde la cabeza hasta los talones. Evita a toda costa dejar caer la cadera hacia el suelo o elevar los glúteos formando una pirámide; mantén el cuello alineado mirando al suelo.",
  "Plancha lateral": "Acuéstate sobre un costado de tu cuerpo en el suelo. Apoya el antebrazo del lado inferior de manera que el codo quede justo debajo del hombro, perpendicular al torso. Coloca un pie directamente sobre el otro (o cruzado al frente para mayor balance). Eleva activamente las caderas separando todo el cuerpo del suelo hasta formar una línea diagonal recta desde la cabeza hasta los pies. Contrae la zona lateral del abdomen (oblicuos) y mantén el brazo libre extendido hacia arriba o firme sobre tu cadera.",
  "Flexiones déficit": "Coloca dos soportes estables, discos pesados o mancuernas tipo hexágono en el suelo, separados a una distancia ligeramente mayor al ancho de tus hombros. Adopta la posición de plancha alta sujetando los soportes con las manos alineadas. Manteniendo el cuerpo rígido como un bloque, flexiona los codos hacia atrás en un ángulo de 45 grados, permitiendo que tu pecho descienda por debajo de la línea de tus manos aprovechando el espacio libre (déficit). Baja hasta sentir un estiramiento seguro en el pectoral y empuja con potencia hasta estirar los brazos.",
  "Remo unilateral": "Coloca la rodilla y la mano del mismo lado sobre un banco plano, manteniendo el torso completamente horizontal y paralelo al suelo con la espalda recta. El otro pie permanece apoyado plano en el suelo a un costado. Sostén una mancuerna con el brazo libre extendido verticalmente. Inicia la tracción tirando del codo hacia atrás y hacia arriba, dirigiendo la mancuerna directamente hacia tu cadera (no hacia el hombro). Contrae firmemente el dorsal en el punto más alto y desciende estirando el brazo por completo de forma controlada.",
  "Press inclinado": "Siéntate en un banco regulado a una inclinación de entre 30 y 45 grados. Apoya la espalda por completo y mantén los pies en el suelo. Sostén las mancuernas a los lados de tus hombros con las palmas orientadas hacia adelante y los codos flexionados apuntando en diagonal al suelo. Empuja las mancuernas verticalmente hacia el techo siguiendo una trayectoria convergente (se acercan levemente arriba sin chocar). Contrae el pecho superior en la cima del movimiento y desciende reteniendo el peso hasta que toquen sutilmente los hombros.",
  "Face pull goma": "Sjeta una banda elástica a una estructura sólida a la altura de tu frente o parte alta del pecho. Da unos pasos hacia atrás para generar tensión en la goma y sepárate con los pies al ancho de hombros, rodillas algo flexionadas. Sostén los extremos de la banda con las palmas orientadas hacia el suelo y brazos extendidos. Tracciona la goma directamente hacia tu rostro (puños en dirección a tus orejas), abriendo los codos hacia afuera y atrás de forma exagerada mientras separas la banda. Aprieta las escápulas y la parte posterior del hombro por un segundo.",
  "Curl araña": "Colócate boca abajo de forma inversa en un banco inclinado a 45 grados, apoyando el pecho firmemente en la parte superior del respaldo. Tus brazos deben colgar verticalmente hacia el suelo debido a la gravedad, sosteniendo una mancuerna en cada mano con agarre supino (palmas al frente). Manteniendo los codos fijos y completamente perpendiculares al suelo en todo momento, flexiona los antebrazos hacia arriba aislando el bíceps. Contrae al máximo arriba y desciende muy despacio estirando el brazo de forma excéntrica.",
  "Katana tríceps": "Colócate de pie o sentado con la espalda recta. Eleva una mancuerna por encima de tu cabeza sosteniéndola con una mano, extendiendo el brazo de forma vertical. Coloca el codo apuntando hacia el frente y lo más pegado que puedas a tu oreja. Con la palma de la mano mirando de reojo hacia adentro, flexiona el codo dejando caer la mancuerna de forma lenta y profunda por detrás de tu nuca hasta sentir un estiramiento extremo en el tríceps. Contrae el músculo extendiendo el brazo nuevamente a la vertical.",
  "Hack squat": "Colócate en la máquina de sentadilla Hack apoyando la espalda y hombros firmemente contra los respaldos acolchados. Ubica los pies en la plataforma central separados al ancho de hombros. Quita los seguros laterales de la máquina. Desciende flexionando las rodillas de forma controlada de modo que tus caderas bajen en línea diagonal por debajo de tus rodillas, buscando un ángulo profundo de 90 grados en las piernas. Manteniendo la espalda totalmente pegada al soporte, empuja con los talones la plataforma para regresar arriba sin bloquear rodillas.",
  "Peso muerto rumano": "Párate erguido sosteniendo una mancuerna en cada mano frente a tus muslos con los brazos estirados. Coloca los pies al ancho de las caderas con las rodillas desbloqueadas (apenas flexionadas unos milímetros). Inicia el ejercicio empujando tu cadera estrictamente hacia atrás como si quisieras tocar la pared con los glúteos. Deja que las mancuernas desciendan rozando verticalmente tus piernas mientras doblas el torso manteniendo la espalda perfectamente recta. Baja hasta la altura de tus espinillas sintiendo un fuerte estiramiento en los femorales, y regresa contrayendo glúteos.",
  "Step up": "Párate frente a un cajón, banco o plataforma estable que tenga una altura aproximada a tus rodillas. Coloca un pie por completo encima de la plataforma de modo que toda la planta esté en contacto. Transfiere el peso de tu cuerpo a la pierna elevada y empuja con fuerza hacia abajo a través de tu talón para elevar todo tu cuerpo, extendiendo la pierna por completo arriba. El pie de apoyo solo asiste mínimamente en el despegue. Baja de forma pausada reteniendo la caída con la pierna del cajón hasta tocar el suelo.",
  "Sentadilla isométrica": "Apoya tu espalda completamente recta contra una pared firme. Desplaza tus pies hacia adelante y ve deslizando tu cuerpo hacia abajo por la pared hasta que tus rodillas formen un ángulo exacto de 90 grados y tus muslos queden perfectamente paralelos al suelo (como si estuvieses sentado en una silla invisible). Tus tobillos deben quedar situados directamente bajo tus rodillas. Presiona los hombros contra la pared, mantén los brazos cruzados o relajados y sostén estáticamente la posición apretando cuádriceps.",
  "Russian twist": "Siéntate en el suelo con las rodillas dobladas y los pies juntos flotando sutilmente a unos centímetros del piso (nivel intermedio) o apoyados (principiante). Inclina el torso hacia atrás en un ángulo de 45 grados respecto al suelo para activar la pared abdominal. Sostén una mancuerna pequeña o tus manos juntas frente al pecho. Gira todo tu torso de forma compacta de lado a lado, intentando llevar la carga a tocar el suelo cerca de tu cadera izquierda y luego hacia la derecha, moviendo los hombros no los brazos."
};

let current=null,startTime=null,timerInt=null,timerRunning=false;
let myChartInstance = null; 

const menu=document.getElementById("menu");

Object.keys(routines).forEach(r=>{
  menu.innerHTML+=`<button class="bg-slate-800 p-4 rounded hover:bg-slate-700 font-medium" onclick="openRoutine('${r}')">${r}</button>`;
});
menu.innerHTML+=`<button class="bg-gradient-to-br from-indigo-900 to-slate-800 p-4 rounded hover:from-indigo-800 text-amber-400 font-bold border border-indigo-700" onclick="openMeasures()">📏 Medidas Corporales</button>`;

function openRoutine(r){
current=r;
document.getElementById("mainPage").classList.add("hidden");
document.getElementById("routineView").classList.remove("hidden");
document.getElementById("title").textContent=r;

// ✅ Cajas vacías siempre al iniciar una sesión
routines[current].forEach((e, idx) => {
  for(let i=1; i<=e[1]; i++) {
    delete store.active[`${current}_${idx}_${i}`];
  }
});
persist();

clearInterval(timerInt);
timerRunning = false;
startTime = null;
document.getElementById("timer").textContent = "00:00:00";
document.getElementById("startTimerBtn").classList.remove("hidden");
render();
}

function startTimerManual() {
  if (timerRunning) return;
  startTime = Date.now();
  timerInt = setInterval(updateTimer, 1000);
  timerRunning = true;
  document.getElementById("startTimerBtn").classList.add("hidden");
}

function updateTimer(){
if(!startTime) return;
let s=Math.floor((Date.now()-startTime)/1000);
let h=String(Math.floor(s/3600)).padStart(2,'0');
let m=String(Math.floor((s%3600)/60)).padStart(2,'0');
let ss=String(s%60).padStart(2,'0');
document.getElementById("timer").textContent=`${h}:${m}:${ss}`;
}

function render(){
const ex=document.getElementById("exercises");
ex.innerHTML="";
let total=0,done=0;

routines[current].forEach((e,idx)=>{
let html=`<div class="bg-slate-800 p-4 rounded mb-4">
<div class="flex justify-between items-center mb-2">
  <div class="flex items-center gap-2">
    <h3 class="font-bold text-lg">${e[0]}</h3>
    <button onclick="showInfoModal('${e[0]}')" class="text-blue-400 hover:text-blue-300 bg-slate-900/60 font-serif font-bold text-sm w-6 h-6 rounded-full flex items-center justify-center border border-blue-500/30 shadow" title="Ver guía de ejecución técnica">ⓘ</button>
  </div>
  <button class="bg-indigo-600 px-2 py-1 rounded text-xs font-semibold" onclick="showHistory('${e[0]}')">📈 Histórico</button>
</div>
<p class="mb-3 text-sm text-slate-300">🎯 ${e[1]} series · ${e[2]} reps</p>`;

for(let i=1;i<=e[1];i++){
total++;
let key=`${current}_${idx}_${i}`;
let data=store.active[key]||{reps:"",weight:""};

if(data.reps && data.weight) done++;

html+=`<div class="grid grid-cols-4 gap-2 mb-2 items-center text-sm">
<div>Serie ${i}</div>
<input class="text-black p-1 rounded text-center" type="number" inputmode="numeric" value="${data.reps}" placeholder="Reps" onchange="saveSet('${key}','reps',this.value)">
<input class="text-black p-1 rounded text-center" type="number" inputmode="decimal" step="any" value="${data.weight}" placeholder="Peso" onchange="saveSet('${key}','weight',this.value)">
<div class="text-center">${data.reps&&data.weight?'✅':'⏳'}</div>
</div>`;
}

html+="</div>";
ex.innerHTML+=html;
});

let pct=Math.round(done*100/total)||0;
document.getElementById("bar").style.width=pct+"%";
document.getElementById("pct").textContent=pct+"%";
}

function saveSet(k,f,v){
if(!store.active[k]) store.active[k]={};
store.active[k][f]=v;
persist();
render();
}

function finishRoutine(){
clearInterval(timerInt);
let duration=document.getElementById("timer").textContent;
let date=new Date().toLocaleString();

routines[current].forEach((e,idx)=>{
let entry={date,routine:current,duration,sets:[]};

for(let i=1;i<=e[1];i++){
let d=store.active[`${current}_${idx}_${i}`]||{};
entry.sets.push({serie:i,reps:d.reps||"",weight:d.weight||""});
}

if(!store.history[e[0]]) store.history[e[0]]=[];
store.history[e[0]].push(entry);
});

store.sessions.push({date,routine:current,duration});

routines[current].forEach((e, idx) => {
  for(let i=1; i<=e[1]; i++) {
    delete store.active[`${current}_${idx}_${i}`];
  }
});

persist();
alert("🎉 Rutina completada y guardada. Tiempo total: "+duration);
backHome();
}

function showHistory(ex){
let h=store.history[ex]||[];
document.getElementById("modalTitle").textContent = "Historial - " + ex;
let out="";

if(!h.length) out+="<p class='text-slate-400 p-2'>Sin historial guardado todavía.</p>";

h.slice().reverse().forEach(s=>{
out+=`<div class="border border-slate-600 bg-slate-900 p-3 mb-3 rounded-lg text-sm">
<div class="grid grid-cols-2 gap-2 mb-2 text-slate-400">
  <div><b>Fecha:</b> ${s.date}</div>
  <div><b>Duración:</b> ${s.duration}</div>
</div>
<table class="w-full text-center mt-2">
<tr class="bg-slate-700 text-slate-200 text-xs"><th>Serie</th><th>Reps</th><th>Peso</th></tr>
${s.sets.map(x=>`<tr class="border-b border-slate-800"><td class="py-1 font-bold">Serie ${x.serie}</td><td>${x.reps || '-'}</td><td>${x.weight ? x.weight+' kg' : '-'}</td></tr>`).join("")}
</table>
</div>`;
});

document.getElementById("modalContent").innerHTML=out;
document.getElementById("modal").classList.remove("hidden");
}

function showInfoModal(name) {
  document.getElementById("modalTitle").textContent = "Guía de Ejecución: " + name;
  let text = desc[name] || "Descripción técnica no disponible para este ejercicio.";
  document.getElementById("modalContent").innerHTML = `
    <div class="bg-slate-900 p-4 rounded-xl border border-blue-500/20 leading-relaxed text-slate-200">
      <p class="text-base font-normal whitespace-pre-line">${text}</p>
    </div>
  `;
  document.getElementById("modal").classList.remove("hidden");
}

function closeModal(){
document.getElementById("modal").classList.add("hidden");
}

function persist(){
localStorage.setItem("gymPro",JSON.stringify(store));
}

function backHome(){
clearInterval(timerInt);
timerRunning = false;
document.getElementById("routineView").classList.add("hidden");
document.getElementById("measuresView").classList.add("hidden");
document.getElementById("mainPage").classList.remove("hidden");
}

// ================= SECCIÓN DE MEDIDAS CORPORALES =================

function openMeasures(){
  document.getElementById("mainPage").classList.add("hidden");
  document.getElementById("measuresView").classList.remove("hidden");
  document.getElementById("chartContainer").classList.add("hidden");
  
  // Limpiar inputs
  document.getElementById("m_peso").value = "";
  const fields = ['brazo', 'pierna', 'cintura', 'estomago', 'cadera', 'pecho', 'gluteo'];
  fields.forEach(f => document.getElementById(`m_${f}`).value = "");
  
  renderMeasuresTable();
}

function saveMeasures() {
  const fields = ['brazo', 'pierna', 'cintura', 'estomago', 'cadera', 'pecho', 'gluteo'];
  let pesoVal = document.getElementById("m_peso").value;

  let data = {
    date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
    peso: pesoVal ? parseFloat(pesoVal) : 0
  };
  
  let valid = pesoVal ? true : false;
  fields.forEach(f => {
    let val = document.getElementById(`m_${f}`).value;
    if(val) valid = true;
    data[f] = val ? parseFloat(val) : 0;
  });
  
  if(!valid) {
    alert("❌ Rellena el peso o al menos una medida corporal para registrar.");
    return;
  }
  
  store.measures.push(data);
  persist();
  alert("📏 Registro guardado exitosamente.");
  openMeasures(); 
}

function renderMeasuresTable() {
  const tbody = document.getElementById("measuresTableBody");
  tbody.innerHTML = "";
  
  if(store.measures.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" class="text-center p-4 text-slate-500">Sin datos cargados.</td></tr>`;
    return;
  }
  
  store.measures.slice().reverse().forEach(m => {
    tbody.innerHTML += `
      <tr class="border-b border-slate-700 hover:bg-slate-750 text-xs">
        <td class="px-1 py-2 text-slate-400 font-mono">${m.date}</td>
        <td class="px-1 py-2 text-center font-extrabold text-amber-400 bg-amber-500/10">${m.peso || '-'}</td>
        <td class="px-1 py-2 text-center font-semibold text-blue-400">${m.brazo || '-'}</td>
        <td class="px-1 py-2 text-center font-semibold text-emerald-400">${m.pierna || '-'}</td>
        <td class="px-1 py-2 text-center font-semibold text-orange-400">${m.cintura || '-'}</td>
        <td class="px-1 py-2 text-center font-semibold text-red-400">${m.estomago || '-'}</td>
        <td class="px-1 py-2 text-center font-semibold text-purple-400">${m.cadera || '-'}</td>
        <td class="px-1 py-2 text-center font-semibold text-pink-400">${m.pecho || '-'}</td>
        <td class="px-1 py-2 text-center font-semibold text-orange-300">${m.gluteo || '-'}</td>
      </tr>
    `;
  });
}

function toggleMeasuresChart() {
  const container = document.getElementById("chartContainer");
  if(!container.classList.contains("hidden")) {
    container.classList.add("hidden");
    return;
  }
  
  if(store.measures.length === 0) {
    alert("Registra datos de evolución primero.");
    return;
  }
  
  container.classList.remove("hidden");
  
  const labels = store.measures.map(m => m.date.split(" ")[0]);
  const pData = store.measures.map(m => m.peso || null);
  const bData = store.measures.map(m => m.brazo || null);
  const piData = store.measures.map(m => m.pierna || null);
  const cData = store.measures.map(m => m.cintura || null);
  const eData = store.measures.map(m => m.estomago || null);
  const caData = store.measures.map(m => m.cadera || null);
  const peData = store.measures.map(m => m.pecho || null);
  const glData = store.measures.map(m => m.gluteo || null);

  const ctx = document.getElementById('measuresChart').getContext('2d');
  
  if (myChartInstance) {
    myChartInstance.destroy();
  }

  myChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Peso (kg)', data: pData, borderColor: '#fbbf24', borderWidth: 2.5, tension: 0.15, spanGaps: true },
        { label: 'Brazo', data: bData, borderColor: '#60a5fa', tension: 0.15, spanGaps: true },
        { label: 'Pierna', data: piData, borderColor: '#34d399', tension: 0.15, spanGaps: true },
        { label: 'Cintura', data: cData, borderColor: '#f97316', tension: 0.15, spanGaps: true },
        { label: 'Estómago', data: eData, borderColor: '#f87171', tension: 0.15, spanGaps: true },
        { label: 'Cadera', data: caData, borderColor: '#c084fc', tension: 0.15, spanGaps: true },
        { label: 'Pecho', data: peData, borderColor: '#f472b6', tension: 0.15, spanGaps: true },
        { label: 'Glúteo', data: glData, borderColor: '#fdba74', tension: 0.15, spanGaps: true }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#cbd5e1', boxWidth: 8, font: { size: 10 } } }
      },
      scales: {
        x: { ticks: { color: '#94a3b8', font: { size: 9 } }, grid: { color: '#334155' } },
        y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
      }
    }
  });
}

// ================= BACKUP FUNCIONES =================
function exportData(){
  const blob = new Blob([JSON.stringify(store)], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "gym_backup.json";
  a.click();
}

function importData(){
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "application/json";

  input.onchange = e => {
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const data = JSON.parse(reader.result);
        localStorage.setItem("gymPro", JSON.stringify(data));
        alert("✅ Datos restaurados");
        location.reload();
      } catch {
        alert("❌ Error en archivo");
      }
    };
    reader.readAsText(e.target.files[0]);
  };

  input.click();
}

</script>
